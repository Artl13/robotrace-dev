<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 1280 640" width="1280" height="640" role="img" aria-label="RoboTrace Python SDK: observability and evals for AI-powered robots. pip install robotrace-dev.">
  <title>RoboTrace SDK social preview</title>
  <defs>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#22d3ee"/>
      <stop offset="0.4" stop-color="#a78bfa"/>
      <stop offset="0.7" stop-color="#fcd34d"/>
      <stop offset="1" stop-color="#34d399"/>
    </linearGradient>
    <linearGradient id="scrim" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#07080e" stop-opacity="0.97"/>
      <stop offset="0.42" stop-color="#07080e" stop-opacity="0.86"/>
      <stop offset="0.66" stop-color="#07080e" stop-opacity="0.35"/>
      <stop offset="0.82" stop-color="#07080e" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="floor" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#07080e" stop-opacity="0"/>
      <stop offset="1" stop-color="#07080e" stop-opacity="0.55"/>
    </linearGradient>
    <style>
      text { font-family: -apple-system, 'Segoe UI', Inter, Roboto, Helvetica, Arial, sans-serif; }
      .mono { font-family: 'SFMono-Regular', ui-monospace, 'Cascadia Code', Menlo, Consolas, monospace; }
      .eyebrow { font-size: 23px; font-weight: 700; letter-spacing: 7px; fill: #22d3ee; }
      .wordmark { font-size: 94px; font-weight: 800; fill: #f5f7fa; letter-spacing: -2px; }
      .tagline { font-size: 37px; font-weight: 600; fill: #d4dbe6; }
      .url { font-size: 22px; font-weight: 600; fill: #aeb7c4; letter-spacing: 1px; }
    </style>
  </defs>

  <rect width="1280" height="640" fill="#07080e"/>
  <image href="social-bg.png" xlink:href="social-bg.png" x="0" y="0" width="1280" height="640" preserveAspectRatio="xMidYMid slice"/>
  <rect width="1280" height="640" fill="url(#floor)"/>
  <rect width="1280" height="640" fill="url(#scrim)"/>
  <rect width="1280" height="6" fill="url(#accent)"/>

  <!-- project logo -->
  <g transform="translate(88,150)">
    <clipPath id="logoClip"><rect x="0" y="0" width="96" height="96" rx="23"/></clipPath>
    <image href="logo.png" xlink:href="logo.png" x="0" y="0" width="96" height="96" clip-path="url(#logoClip)"/>
    <rect x="0" y="0" width="96" height="96" rx="23" fill="none" stroke="#ffffff" stroke-opacity="0.10"/>
  </g>

  <text x="212" y="182" class="eyebrow">PYTHON SDK</text>
  <text x="210" y="264" class="wordmark"><tspan>Robo</tspan><tspan fill-opacity="0.55">Trace</tspan></text>

  <text x="212" y="332" class="tagline">Observability &amp; evals</text>
  <text x="212" y="378" class="tagline">for AI-powered robots.</text>

  <!-- terminal pill -->
  <g transform="translate(212,418)">
    <rect x="0" y="0" width="548" height="62" rx="14" fill="#11131d" fill-opacity="0.92" stroke="#ffffff" stroke-opacity="0.10"/>
    <circle cx="26" cy="31" r="6" fill="#ff5f57"/>
    <circle cx="48" cy="31" r="6" fill="#febc2e"/>
    <circle cx="70" cy="31" r="6" fill="#28c840"/>
    <text x="100" y="40" class="mono" font-size="26" fill="#22d3ee">$</text>
    <text x="128" y="40" class="mono" font-size="26" fill="#e6edf3">pip install robotrace-dev</text>
  </g>

  <text x="214" y="528" class="url mono">robotrace.dev</text>
</svg>
