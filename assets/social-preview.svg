<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 1280 640" width="1280" height="640" role="img" aria-label="RoboTrace Python SDK: observability and evals for AI-powered robots. pip install robotrace-dev.">
  <title>RoboTrace SDK social preview</title>
  <defs>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#22d3ee"/>
      <stop offset="0.4" stop-color="#a78bfa"/>
      <stop offset="0.7" stop-color="#fcd34d"/>
      <stop offset="1" stop-color="#34d399"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.18" cy="0.22" r="0.9">
      <stop offset="0" stop-color="#1b2440" stop-opacity="0.9"/>
      <stop offset="1" stop-color="#0a0b13" stop-opacity="0"/>
    </radialGradient>
    <style>
      text { font-family: -apple-system, 'Segoe UI', Inter, Roboto, Helvetica, Arial, sans-serif; }
      .mono { font-family: 'SFMono-Regular', ui-monospace, 'Cascadia Code', Menlo, Consolas, monospace; }
      .eyebrow { font-size: 22px; font-weight: 700; letter-spacing: 6px; fill: #22d3ee; }
      .wordmark { font-size: 96px; font-weight: 800; fill: #f2f5f9; letter-spacing: -2px; }
      .tagline { font-size: 36px; font-weight: 600; fill: #c7d0dd; }
      .desc { font-size: 22px; fill: #8b95a7; }
      .chip { font-size: 21px; font-weight: 700; }
      .url { font-size: 22px; font-weight: 700; fill: #9aa4b2; letter-spacing: 1px; }
      .arrow { font-size: 22px; fill: #5b6677; }
    </style>
  </defs>

  <rect width="1280" height="640" fill="#0a0b13"/>
  <rect width="1280" height="640" fill="url(#glow)"/>
  <rect width="1280" height="6" fill="url(#accent)"/>

  <!-- project logo -->
  <g transform="translate(96,108)">
    <clipPath id="logoClip"><rect x="0" y="0" width="92" height="92" rx="22"/></clipPath>
    <image href="logo.png" xlink:href="logo.png" x="0" y="0" width="92" height="92" clip-path="url(#logoClip)"/>
    <rect x="0" y="0" width="92" height="92" rx="22" fill="none" stroke="#ffffff" stroke-opacity="0.08"/>
  </g>

  <text x="212" y="138" class="eyebrow">PYTHON SDK</text>
  <text x="210" y="232" class="wordmark"><tspan>Robo</tspan><tspan fill-opacity="0.55">Trace</tspan></text>

  <text x="212" y="300" class="tagline">Observability &amp; evals for AI-powered robots.</text>
  <text x="212" y="346" class="desc">Log synced video + sensors + actions &#183; replay frame-accurate &#183; re-roll policies against history.</text>

  <!-- terminal pill -->
  <g transform="translate(212,392)">
    <rect x="0" y="0" width="560" height="64" rx="14" fill="#11131d" stroke="#ffffff" stroke-opacity="0.08"/>
    <circle cx="26" cy="32" r="6" fill="#ff5f57"/>
    <circle cx="48" cy="32" r="6" fill="#febc2e"/>
    <circle cx="70" cy="32" r="6" fill="#28c840"/>
    <text x="100" y="40" class="mono" font-size="26" fill="#22d3ee">$</text>
    <text x="128" y="40" class="mono" font-size="26" fill="#e6edf3">pip install robotrace-dev</text>
  </g>

  <!-- the loop chips -->
  <g transform="translate(212,520)">
    <g>
      <rect x="0" y="0" width="150" height="48" rx="24" fill="#22d3ee" fill-opacity="0.12" stroke="#22d3ee" stroke-opacity="0.4"/>
      <text x="75" y="31" text-anchor="middle" class="chip" fill="#67e8f9">Record</text>
    </g>
    <text x="168" y="31" class="arrow">&#8594;</text>
    <g transform="translate(192,0)">
      <rect x="0" y="0" width="150" height="48" rx="24" fill="#a78bfa" fill-opacity="0.12" stroke="#a78bfa" stroke-opacity="0.4"/>
      <text x="75" y="31" text-anchor="middle" class="chip" fill="#c4b5fd">Replay</text>
    </g>
    <text x="360" y="31" class="arrow">&#8594;</text>
    <g transform="translate(384,0)">
      <rect x="0" y="0" width="150" height="48" rx="24" fill="#fcd34d" fill-opacity="0.12" stroke="#fcd34d" stroke-opacity="0.4"/>
      <text x="75" y="31" text-anchor="middle" class="chip" fill="#fde68a">Explain</text>
    </g>
    <text x="552" y="31" class="arrow">&#8594;</text>
    <g transform="translate(576,0)">
      <rect x="0" y="0" width="150" height="48" rx="24" fill="#34d399" fill-opacity="0.12" stroke="#34d399" stroke-opacity="0.4"/>
      <text x="75" y="31" text-anchor="middle" class="chip" fill="#6ee7b7">Verify</text>
    </g>
  </g>

  <text x="1184" y="600" text-anchor="end" class="url mono">robotrace.dev</text>
</svg>
