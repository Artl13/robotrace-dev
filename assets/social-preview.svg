<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 1280 640" width="1280" height="640" role="img" aria-label="RoboTrace Python SDK: observability and evals for AI-powered robots. pip install robotrace-dev.">
  <title>RoboTrace SDK social preview</title>
  <defs>
    <radialGradient id="glow" cx="0.5" cy="0.16" r="0.85">
      <stop offset="0" stop-color="#1a2542" stop-opacity="0.85"/>
      <stop offset="0.55" stop-color="#0d1020" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#08090f" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="track" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#22d3ee" stop-opacity="0"/>
      <stop offset="0.12" stop-color="#22d3ee" stop-opacity="0.9"/>
      <stop offset="0.5" stop-color="#a78bfa" stop-opacity="0.9"/>
      <stop offset="0.88" stop-color="#34d399" stop-opacity="0.9"/>
      <stop offset="1" stop-color="#34d399" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="node" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#67e8f9"/>
      <stop offset="1" stop-color="#22d3ee"/>
    </radialGradient>
    <style>
      text { font-family: -apple-system, 'SF Pro Display', 'Segoe UI', Inter, Roboto, Helvetica, Arial, sans-serif; }
      .mono { font-family: 'SFMono-Regular', ui-monospace, 'Cascadia Code', Menlo, Consolas, monospace; }
      .kicker { font-size: 19px; font-weight: 600; letter-spacing: 8px; fill: #5fd6e8; }
      .wordmark { font-size: 104px; font-weight: 700; fill: #f6f8fb; letter-spacing: -3px; }
      .tagline { font-size: 31px; font-weight: 400; fill: #9aa4b3; letter-spacing: 0.2px; }
      .foot { font-size: 23px; font-weight: 500; fill: #8a93a3; letter-spacing: 0.5px; }
    </style>
  </defs>

  <rect width="1280" height="640" fill="#08090f"/>
  <rect width="1280" height="640" fill="url(#glow)"/>

  <!-- logo, centered -->
  <g transform="translate(603,96)">
    <clipPath id="logoClip"><rect x="0" y="0" width="74" height="74" rx="18"/></clipPath>
    <image href="logo.png" xlink:href="logo.png" x="0" y="0" width="74" height="74" clip-path="url(#logoClip)"/>
    <rect x="0" y="0" width="74" height="74" rx="18" fill="none" stroke="#ffffff" stroke-opacity="0.10"/>
  </g>

  <text x="640" y="214" text-anchor="middle" class="kicker">PYTHON&#160;&#160;SDK</text>
  <text x="640" y="312" text-anchor="middle" class="wordmark"><tspan>Robo</tspan><tspan fill-opacity="0.5">Trace</tspan></text>
  <text x="640" y="364" text-anchor="middle" class="tagline">Observability &amp; evals for AI-powered robots.</text>

  <!-- synced streams on one timeline -->
  <g>
    <path d="M360 430 C 430 416 500 444 570 428 S 712 410 782 432 S 880 416 920 428"
          fill="none" stroke="#22d3ee" stroke-opacity="0.85" stroke-width="2.5" stroke-linecap="round"/>
    <path d="M360 456 C 430 466 500 440 570 458 S 712 474 782 448 S 880 462 920 454"
          fill="none" stroke="#a78bfa" stroke-opacity="0.85" stroke-width="2.5" stroke-linecap="round"/>
    <path d="M360 482 C 430 474 500 494 570 480 S 712 466 782 486 S 880 472 920 482"
          fill="none" stroke="#34d399" stroke-opacity="0.8" stroke-width="2.5" stroke-linecap="round"/>

    <!-- shared timeline -->
    <rect x="356" y="506" width="568" height="2.5" rx="1.25" fill="url(#track)"/>
    <g fill="#2b3548">
      <rect x="450" y="500" width="2" height="9" rx="1"/>
      <rect x="544" y="500" width="2" height="9" rx="1"/>
      <rect x="638" y="500" width="2" height="9" rx="1"/>
      <rect x="732" y="500" width="2" height="9" rx="1"/>
      <rect x="826" y="500" width="2" height="9" rx="1"/>
    </g>

    <!-- playhead -->
    <line x1="640" y1="414" x2="640" y2="507" stroke="#eef3f8" stroke-opacity="0.5" stroke-width="1.5"/>
    <circle cx="640" cy="507" r="11" fill="#22d3ee" fill-opacity="0.18"/>
    <circle cx="640" cy="507" r="5.5" fill="url(#node)"/>
  </g>

  <text x="640" y="582" text-anchor="middle" class="foot mono">pip install robotrace-dev</text>
</svg>
